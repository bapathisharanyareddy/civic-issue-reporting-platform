<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CivicConnect — Grievance Management System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===================== AUTH SECTION ===================== -->
  <div id="auth-section">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="brand-icon">🏛️</div>
        <h1>CivicConnect</h1>
        <p>Grievance Management System</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-action="toggle-tab" data-tab="login">Login</button>
        <button class="auth-tab" data-action="toggle-tab" data-tab="register">Register</button>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="auth-form" autocomplete="on">
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Enter your password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-full">Login</button>
        <p class="auth-hint">New user? <a href="#" data-action="toggle-tab" data-tab="register">Register here</a></p>
      </form>

      <!-- Register Form -->
      <form id="register-form" class="auth-form hidden" autocomplete="off">
        <div class="form-group">
          <label for="reg-name">Full Name</label>
          <input type="text" id="reg-name" placeholder="Your full name" required autocomplete="name" />
        </div>
        <div class="form-group">
          <label for="reg-email">Email Address</label>
          <input type="email" id="reg-email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="reg-phone">Phone Number</label>
          <input type="tel" id="reg-phone" placeholder="+91 98765 43210" autocomplete="tel" />
        </div>
        <div class="form-group">
          <label for="reg-password">Password <small>(min 6 characters)</small></label>
          <input type="password" id="reg-password" placeholder="Create a password" required autocomplete="new-password" minlength="6" />
        </div>
        <div class="form-group">
          <label for="reg-confirm">Confirm Password</label>
          <input type="password" id="reg-confirm" placeholder="Repeat your password" required autocomplete="new-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        <p class="auth-hint">Already have an account? <a href="#" data-action="toggle-tab" data-tab="login">Login here</a></p>
      </form>
    </div>
  </div>

  <!-- ===================== MAIN APP SECTION ===================== -->
  <div id="main-section" class="hidden">

    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-brand">
        <span class="sidebar-icon">🏛️</span>
        <span class="sidebar-title">CivicConnect</span>
      </div>

      <nav id="sidebar-nav">
        <!-- Rendered dynamically by JS -->
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="sidebar-avatar">U</div>
          <div>
            <div class="sidebar-user-name" id="sidebar-user-name">User</div>
            <div class="sidebar-user-role" id="sidebar-user-role">Citizen</div>
          </div>
        </div>
        <button class="btn-icon logout-btn" data-action="logout" title="Logout">⏻</button>
      </div>
    </aside>

    <!-- Content Wrapper -->
    <div class="content-wrapper">
      <header class="top-bar">
        <button class="menu-toggle" data-action="toggle-sidebar">☰</button>
        <h2 id="page-title">Dashboard</h2>
        <div class="top-bar-right">
          <span class="top-user" id="top-user-name"></span>
        </div>
      </header>

      <main id="content-area">
        <!-- Views rendered here by JS -->
      </main>
    </div>
  </div>

  <!-- ===================== MODAL ===================== -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-box">
      <div class="modal-header">
        <h3 id="modal-title">Modal</h3>
        <button class="btn-icon" data-action="close-modal">✕</button>
      </div>
      <div id="modal-body">
        <!-- Modal content rendered by JS -->
      </div>
    </div>
  </div>

  <!-- ===================== LOADING OVERLAY ===================== -->
  <div id="loading-overlay" class="hidden">
    <div class="spinner"></div>
  </div>

  <!-- ===================== TOAST CONTAINER ===================== -->
  <div id="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
